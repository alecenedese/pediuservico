    <script>
        // Força modo paisagem e fullscreen ao carregar a página
        document.addEventListener('DOMContentLoaded', function() {
            // Aguarda um pouco antes de tentar fullscreen para melhor compatibilidade
            setTimeout(() => {
                // Tenta entrar em fullscreen
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(err => {
                        console.log('Fullscreen não suportado:', err);
                    });
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE11 */
                    elem.msRequestFullscreen();
                } else if (elem.mozRequestFullScreen) { /* Firefox */
                    elem.mozRequestFullScreen();
                }
            }, 500);

            // Força orientação paisagem se suportado
            if (screen.orientation) {
                if (screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(err => {
                        console.log('Orientação paisagem não suportada:', err);
                    });
                }
            }

            // Alternativa para dispositivos que não suportam screen.orientation.lock
            if (window.screen && window.screen.lockOrientation) {
                window.screen.lockOrientation('landscape');
            } else if (window.screen && window.screen.mozLockOrientation) {
                window.screen.mozLockOrientation('landscape');
            } else if (window.screen && window.screen.msLockOrientation) {
                window.screen.msLockOrientation('landscape');
            }
        });

        // Adiciona evento de clique para tentar fullscreen se não funcionou automaticamente
        document.body.addEventListener('click', function() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(err => {
                        console.log('Fullscreen não suportado:', err);
                    });
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                } else if (elem.mozRequestFullScreen) {
                    elem.mozRequestFullScreen();
                }
            }
        }, { once: true });

        function handleServiceProvider() {
            window.location.href = 'login.php';
        }

        function handleServiceSeeker() {
            window.location.href = 'buscar.html';
        }
    </script>
